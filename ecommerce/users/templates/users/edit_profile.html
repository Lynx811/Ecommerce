{% extends "core/base.html" %}

{% block content %}
<style>
   /* Container for the form */
.edit-profile-container {
    width: 50%;
    margin: 0 auto;
    padding: 20px;
    background-color: #f9f9f9;
    border-radius: 8px;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}

/* Heading style */
.edit-profile-container h1 {
    text-align: center;
    color: #004d40;
    margin-bottom: 20px;
}

/* Style for form elements */
.edit-profile-container form {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.edit-profile-container form label {
    font-weight: bold;
    color: #004d40;
}

.edit-profile-container form input[type="text"],
.edit-profile-container form input[type="email"],
.edit-profile-container form input[type="file"],
.edit-profile-container form input[type="tel"],
.edit-profile-container form textarea {
    padding: 10px;
    font-size: 16px;
    border: 1px solid #ddd;
    border-radius: 5px;
    transition: border-color 0.3s ease;
    width: 100%;
}

.edit-profile-container form input:focus,
.edit-profile-container form textarea:focus {
    border-color: #004d40;
    outline: none;
}

/* Button styling */
.edit-profile-container button {
    background-color: #004d40;
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background-color 0.3s ease;
}

.edit-profile-container button:hover {
    background-color: #00332c;
}

/* Password change form */
.password-change-container {
    margin-top: 20px;
}

.password-change-container input {
    margin-bottom: 10px;
}

/* ===== ✅ RESPONSIVE DESIGN ===== */
@media (max-width: 768px) {
    .edit-profile-container {
        width: 80%;
        padding: 15px;
    }

    .edit-profile-container h1 {
        font-size: 22px;
    }

    .edit-profile-container form input,
    .edit-profile-container form textarea {
        font-size: 14px;
        padding: 8px;
    }

    .edit-profile-container button {
        font-size: 14px;
        padding: 8px 15px;
    }
}

@media (max-width: 480px) {
    .edit-profile-container {
        width: 95%;
        padding: 10px;
    }

    .edit-profile-container h1 {
        font-size: 20px;
    }

    .edit-profile-container form {
        gap: 10px;
    }

    .edit-profile-container form input,
    .edit-profile-container form textarea {
        font-size: 12px;
        padding: 6px;
    }

    .edit-profile-container button {
        font-size: 12px;
        padding: 6px 12px;
    }
}

</style>

<div class="edit-profile-container">
    <h1>Edit Profile</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <!-- Username -->
        <label for="username">Username</label>
        <input type="text" name="username" value="{{ form.username.value }}" required>
        
        <!-- Email -->
        <label for="email">Email</label>
        <input type="email" name="email" value="{{ form.email.value }}" required>
        
        <!-- Phone Number -->
        <label for="phone_number">Phone Number</label>
        <input type="tel" name="phone_number" value="{{ form.phone_number.value }}" required>
        
        <!-- Profile Picture -->
        <label for="profile_picture">Profile Picture</label>
        <input type="file" name="profile_picture" accept="image/*">

        <!-- Location -->
        <label for="location">Location</label>
        <input type="text" name="location" value="{{ form.location.value }}" placeholder="Enter your location (optional)">

        <button type="submit">Save Changes</button>
    </form>

    <!-- Profile Picture Preview -->
    {% if user.profile.profile_picture %}
        <div>
            <h3>Profile Picture</h3>
            <img src="{{ user.profile.profile_picture.url }}" alt="Profile Picture" width="100" height="100">
        </div>
    {% endif %}

    <!-- Button to toggle password change form -->
    <div class="password-change-container">
        <button id="change-password-btn" type="button" onclick="togglePasswordChangeForm()">Change Password</button>
    </div>

    <!-- Password change form (hidden by default) -->
    <div id="password-change-form" style="display:none;">
        <h2>Change Password</h2>
        <form method="POST">
            {% csrf_token %}
            <label for="new_password">New Password:</label>
            <input type="password" name="new_password" id="new_password" required><br>

            <label for="confirm_password">Confirm New Password:</label>
            <input type="password" name="confirm_password" id="confirm_password" required><br>

            <button type="submit">Change Password</button>
        </form>
    </div>
</div>

<script>
    // Function to toggle the visibility of the password change form
    function togglePasswordChangeForm() {
        var form = document.getElementById('password-change-form');
        var button = document.getElementById('change-password-btn');
        if (form.style.display === "none") {
            form.style.display = "block";
            button.innerText = "Cancel";  // Change button text to "Cancel"
        } else {
            form.style.display = "none";
            button.innerText = "Change Password";  // Reset button text
        }
    }
</script>

{% endblock %}
