{% extends "core/base.html" %}

{% block content %}
<style>
    /* Container for the register form */
    .register-container {
        width: 100%;
        max-width: 500px;
        margin: 0 auto;
        padding: 30px;
        background-color: #f9f9f9;
        border-radius: 8px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    /* Heading style */
    .register-container h2 {
        text-align: center;
        color: #004d40;
        margin-bottom: 20px;
    }

    /* Form elements */
    .register-container form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .register-container form label {
        font-weight: bold;
        color: #004d40;
    }

    .register-container form input[type="text"],
    .register-container form input[type="email"],
    .register-container form input[type="password"],
    .register-container form input[type="file"] {
        padding: 10px;
        font-size: 16px;
        border: 1px solid #ddd;
        border-radius: 5px;
        transition: border-color 0.3s ease;
    }

    .register-container form input[type="text"]:focus,
    .register-container form input[type="email"]:focus,
    .register-container form input[type="password"]:focus,
    .register-container form input[type="file"]:focus {
        border-color: #004d40;
        outline: none;
    }

    /* Register button */
    .register-container button {
        background-color: #004d40;
        color: white;
        padding: 10px 20px;
        font-size: 16px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        transition: background-color 0.3s ease;
    }

    .register-container button:hover {
        background-color: #00332c;
    }

    /* Optional: Add some styling for error messages */
    .error-message {
        color: red;
        font-size: 14px;
        margin-top: 10px;
    }
</style>

<div class="register-container">
    <h2>Register</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
</div>

{% endblock %}
